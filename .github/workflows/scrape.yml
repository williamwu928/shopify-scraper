name: Scrape Shopify Apps (Weekly)

on:
  schedule:
    # Every Sunday at 00:00 UTC
    - cron: "0 0 * * 0"
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  scrape:
    name: Scrape & Commit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTPUT_DIR: data
        run: |
          python scrape.py \
            --out data/shopify_apps_all_categories.csv \
            --dedupe-global \
            --verbose

      - name: Check for changes
        id: changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if git diff --stat | grep -q "shopify_apps"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push (if changed)
        if: steps.changed.outputs.changed == 'true'
        run: |
          git add data/
          git commit -m "chore: weekly scrape $(date +%Y-%m-%d)"
          git push

      - name: No changes
        if: steps.changed.outputs.changed == 'false'
        run: echo "No new data — skipping commit."
